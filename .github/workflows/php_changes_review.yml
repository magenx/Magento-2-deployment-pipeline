name: Ask Copilot to review PHP changes

on:
  pull_request:
    types: [opened]
    paths:
      - '**.php'
      - '**.phtml'

permissions:
  pull-requests: write

jobs:
  ping-copilot:
    runs-on: ubuntu-latest
    steps:
      - name: Request Copilot review via API headers
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euxo pipefail
          gh api \
          --method POST \
          -H "Accept: application/vnd.github+json" \
          -H "X-GitHub-Api-Version: 2026-03-10" \
          /repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/requested_reviewers \
          --input - <<< '{ "reviewers": ["copilot"] }'
